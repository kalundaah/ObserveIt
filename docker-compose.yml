version: "3.3"

services:
  api:
    build: "./FastApi Backend"
    ports:
      - "8000:8000"
    depends_on:
      #- kafka
      - rabbitmq
      - db
      - redis
    volumes:
      - "./FastApi Backend:/app"
    networks:
      - backend


  #worker:
    #build: ./worker
    #depends_on:
     # - broker
      #- db

  agent:
    build: ./Agent
    volumes:
      - ./Agent:/app
    #deploy:
     # replicas: 3   # simulate multiple nodes
    networks:
      - backend

  # zookeeper:
  #   image: zookeeper:latest
  #   environment:
  #     - ALLOW_ANONYMOUS_LOGIN=yes
  #   networks:
  #     - backend

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      "RABBITMQ_DEFAULT_USER": "user"
      "RABBITMQ_DEFAULT_PASS": "password"
    networks: 
      - backend


  # kafka:
  #   image: apache/kafka:latest
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     - KAFKA_BROKER_ID=1
  #     - KAFKA_LISTENERS=PLAINTEXT://:9092
  #     - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
  #     - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
  #   depends_on:
  #     - zookeeper
  #   networks:
  #     - backend


  db:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=observability
    networks:
      - backend


  redis:
    image: redis:latest
    networks:
      - backend

networks:
  backend:
    driver: bridge